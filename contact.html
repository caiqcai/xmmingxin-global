<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Xiamen Mingxin | Get a Precision Manufacturing Quote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-blue-800 flex items-center">
                <i class="fas fa-cogs mr-2"></i> MINGXIN PRECISION
            </div>
            <div class="hidden md:flex space-x-8 text-sm font-medium">
                <a href="index.html" class="hover:text-blue-600 transition">Home</a>
                <a href="products.html" class="hover:text-blue-600 transition">Products</a>
                <a href="about.html" class="hover:text-blue-600 transition">About Us</a>
                <a href="contact.html" class="text-blue-600">Contact</a>
            </div>
        </nav>
    </header>

    <section class="py-20">
        <div class="container mx-auto px-6">
            <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row">
                <!-- Contact Info -->
                <div class="md:w-1/2 bg-blue-800 p-12 text-white">
                    <h2 class="text-3xl font-bold mb-8">Contact Information</h2>
                    <p class="mb-10 text-blue-200">Send us your drawings (STEP, IGS, PDF) for a free DFM feedback and quote within 24 hours.</p>
                    <div class="space-y-6">
                        <div class="flex items-start">
                            <i class="fas fa-envelope mt-1 mr-4 text-blue-300"></i>
                            <div>
                                <p class="font-bold">Email</p>
                                <a href="mailto:iris@mingxinltd.com" class="text-blue-100 hover:text-white transition">iris@mingxinltd.com</a>
                            </div>
                        </div>
                        <div class="flex items-start">
                            <i class="fas fa-map-marker-alt mt-1 mr-4 text-blue-300"></i>
                            <div>
                                <p class="font-bold">Address</p>
                                <p class="text-blue-100">No. XX Manufacturing Industrial Zone, Xiamen, Fujian, China</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Form -->
                <div class="md:w-1/2 p-12">
                    <form action="https://formspree.io/f/mgojkeel" method="POST">
                        <div class="mb-6">
                            <label class="block text-sm font-bold mb-2">Full Name</label>
                            <input type="text" name="name" required class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="mb-6">
                            <label class="block text-sm font-bold mb-2">Email Address</label>
                            <input type="email" name="_replyto" required class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="mb-6">
                            <label class="block text-sm font-bold mb-2">Message & Project Details</label>
                            <textarea name="message" rows="4" required class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Please describe your project (Material, Quantity, Tolerance)..."></textarea>
                        </div>
                        <button type="submit" class="w-full bg-blue-800 text-white font-bold py-4 rounded-lg hover:bg-blue-700 transition shadow-lg">
                            Send Inquiry
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
